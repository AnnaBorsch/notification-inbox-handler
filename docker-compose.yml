version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: notification-inbox-postgres
    environment:
      POSTGRES_DB: notification_inbox
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5445:5432"
    volumes:
      - postgres-inbox-data:/var/lib/postgresql/data

volumes:
  postgres-inbox-data: